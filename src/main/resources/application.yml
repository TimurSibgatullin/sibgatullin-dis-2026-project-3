server:
  port: 8080
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never

spring:
  application:
    name: freelib
  datasource:
    url: jdbc:postgresql://localhost:5432/freelib
    username: postgres
    password: "00000000"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  freemarker:
    suffix: .ftlh
    template-loader-path: classpath:/templates/
    settings:
      template_exception_handler: rethrow
      url_escaping_charset: UTF-8
    expose-session-attributes: false
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    static-path-pattern: /static/**
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

app:
  jwt:
    secret: "LJsTDyItcf71Lh6QjBjPz91phMKT26tI0CBPHm9BslwS2NYvdjEiSBrjbZjZ5o5i"
    access-ttl: 3600000
    refresh-ttl: 604800000
  ai:
    gen-url: "http://localhost:11434/v1"
    model-gen: "qwen3.5:4B"
    embed-url: "http://localhost:11435/v1"
    model-embed: "qwen3-embedding:0.6B"
    timeout-sec: 30
  minio:
    endpoint: "http://localhost:9000"
    access-key: "freelib_admin"
    secret-key: "qwerty12345678"
    bucket-name: "books"

logging:
#  level:
#    com.zaxxer.hikari: DEBUG
#    org.postgresql: DEBUG
#    org.flywaydb: DEBUG
  file:
    name: logs/freelib.log