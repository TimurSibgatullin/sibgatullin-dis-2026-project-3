server:
  port: 8080
  servlet:
    context-path: /
  error:
    whitelabel:
      enabled: false
    include-stacktrace: never
    include-message: never

spring:
  application:
    name: freelib
  datasource:
    url: jdbc:postgresql://localhost:5432/freelib
    username: postgres
    password: "00000000"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  freemarker:
    suffix: .ftlh
    template-loader-path: classpath:/templates/
    settings:
      template_exception_handler: rethrow
      url_escaping_charset: UTF-8
    expose-request-attributes: true
    expose-session-attributes: false
  cache:
    type: simple
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    static-path-pattern: /static/**

app:
  jwt:
    secret: "LJsTDyItcf71Lh6QjBjPz91phMKT26tI0CBPHm9BslwS2NYvdjEiSBrjbZjZ5o5i"
    access-ttl: 3600000
    refresh-ttl: 604800000
  ai:
    base-url: "http://localhost:11434/v1"
    model-gen: "llama3:8b"
    model-embed: "nomic-embed-text"
    timeout-sec: 30

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.postgresql: DEBUG
    org.flywaydb: DEBUG
  file:
    name: logs/freelib.log